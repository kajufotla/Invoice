<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Invoice Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-body: #f8fafc;
            --bg-panel: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
            --radius-md: 8px;
            --radius-lg: 12px;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --font-sans: 'Inter', sans-serif;
            --transition: all 0.2s ease-in-out;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        /* Layout */
        .app-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            max-w: 1600px;
            margin: 0 auto;
            padding: 2rem;
            height: 100vh;
            overflow: hidden;
        }

        .editor-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            height: 100%;
            overflow-y: auto;
            padding-right: 1rem;
        }

        .preview-section {
            background-color: var(--bg-panel);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            height: calc(100vh - 4rem);
            overflow-y: auto;
            display: flex;
            justify-content: center;
            padding: 2rem;
            border: 1px solid var(--border);
        }

        /* Typography */
        h1, h2, h3, h4 { font-weight: 600; color: var(--text-main); }
        .text-sm { font-size: 0.875rem; }
        .text-lg { font-size: 1.125rem; }
        .text-xl { font-size: 1.25rem; }
        .text-2xl { font-size: 1.5rem; }
        .text-3xl { font-size: 1.875rem; }
        .text-muted { color: var(--text-muted); }
        .font-medium { font-weight: 500; }
        .font-semibold { font-weight: 600; }
        .font-bold { font-weight: 700; }

        /* Controls & Inputs */
        .card {
            background-color: var(--bg-panel);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
        }

        label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-main);
        }

        input, select, textarea {
            width: 100%;
            padding: 0.625rem 0.875rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-family: inherit;
            font-size: 0.875rem;
            color: var(--text-main);
            background-color: #fff;
            transition: var(--transition);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.625rem 1.25rem;
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: var(--radius-md);
            border: 1px solid transparent;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        .btn-primary {
            background-color: var(--primary);
            color: #fff;
            box-shadow: var(--shadow-sm);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-secondary {
            background-color: #fff;
            color: var(--text-main);
            border-color: var(--border);
            box-shadow: var(--shadow-sm);
        }

        .btn-secondary:hover {
            background-color: var(--bg-body);
        }

        .btn-danger {
            background-color: #fff;
            color: var(--danger);
            border-color: var(--border);
        }

        .btn-danger:hover {
            background-color: #fef2f2;
            border-color: #fca5a5;
        }

        .btn-icon {
            padding: 0.5rem;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--bg-panel);
            padding: 1rem 1.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
            margin-bottom: 0.5rem;
        }

        .top-bar-actions {
            display: flex;
            gap: 0.75rem;
        }

        /* Items Table */
        .items-header {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 40px;
            gap: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .item-row {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr 40px;
            gap: 1rem;
            align-items: start;
            margin-bottom: 1rem;
        }

        /* Totals Block */
        .totals-block {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            width: 100%;
            max-w: 400px;
            margin-left: auto;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.875rem;
        }

        .total-row.grand-total {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--primary);
            border-top: 1px solid var(--border);
            padding-top: 1rem;
            margin-top: 0.5rem;
        }

        /* A4 Document Preview */
        .a4-document {
            width: 210mm;
            min-height: 297mm;
            background: white;
            padding: 40mm 20mm;
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            position: relative;
        }

        .doc-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3rem;
            align-items: flex-start;
        }

        .doc-title {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: -0.025em;
            margin-bottom: 0.5rem;
        }

        .doc-meta {
            text-align: right;
            font-size: 0.875rem;
        }

        .doc-meta p { margin-bottom: 0.25rem; }

        .doc-addresses {
            display: flex;
            justify-content: space-between;
            margin-bottom: 3rem;
            gap: 2rem;
        }

        .address-block {
            flex: 1;
        }

        .address-block h3 {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            letter-spacing: 0.05em;
        }

        .address-block p {
            font-size: 0.875rem;
            white-space: pre-line;
        }

        .doc-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 2rem;
        }

        .doc-table th {
            text-align: left;
            padding: 0.75rem 0;
            border-bottom: 2px solid var(--text-main);
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .doc-table td {
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }

        .doc-table th:last-child, .doc-table td:last-child {
            text-align: right;
        }

        .doc-totals {
            width: 300px;
            margin-left: auto;
        }

        .doc-total-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            font-size: 0.875rem;
        }

        .doc-total-row.grand {
            font-size: 1.25rem;
            font-weight: 700;
            border-top: 2px solid var(--text-main);
            padding-top: 1rem;
            margin-top: 0.5rem;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background-color: var(--text-main);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            font-size: 0.875rem;
            font-weight: 500;
            transform: translateY(100px);
            opacity: 0;
            transition: var(--transition);
            z-index: 50;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* Responsive & Print */
        @media (max-width: 1024px) {
            .app-container {
                grid-template-columns: 1fr;
                overflow: visible;
                height: auto;
            }
            .editor-section, .preview-section {
                height: auto;
                overflow: visible;
                padding-right: 0;
            }
            .a4-document {
                width: 100%;
                min-height: auto;
                padding: 2rem;
            }
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white; height: auto; overflow: visible; }
            .app-container { display: block; padding: 0; margin: 0; max-width: none; }
            .preview-section { 
                box-shadow: none; 
                border: none; 
                padding: 0; 
                height: auto; 
                overflow: visible; 
                display: block; 
            }
            .a4-document { 
                padding: 0; 
                width: 100%; 
                min-height: auto; 
                box-shadow: none; 
            }
            @page { margin: 0.5cm; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- FORM / EDITOR SECTION -->
        <div class="editor-section no-print">
            
            <div class="top-bar">
                <h1 class="text-xl font-bold">Document Generator</h1>
                <div class="top-bar-actions">
                    <button id="btn-save" class="btn btn-secondary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
                        Save
                    </button>
                    <button id="btn-share" class="btn btn-secondary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
                        Share
                    </button>
                    <button id="btn-pdf" class="btn btn-primary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                        Export PDF
                    </button>
                </div>
            </div>

            <div class="card">
                <h2 class="text-lg mb-4">Settings</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>Document Type</label>
                        <select id="doc-type">
                            <option value="Invoice">Invoice</option>
                            <option value="Receipt">Receipt</option>
                            <option value="Quote">Quote</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Currency</label>
                        <select id="currency">
                            <option value="USD">USD ($)</option>
                            <option value="GBP">GBP (£)</option>
                            <option value="CAD">CAD ($)</option>
                            <option value="AUD">AUD ($)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Tax Region</label>
                        <select id="region">
                            <option value="USA">USA (Custom Tax)</option>
                            <option value="UK">UK (VAT 20%)</option>
                            <option value="CAN">Canada (GST 5%)</option>
                            <option value="AUS">Australia (GST 10%)</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2 class="text-lg mb-4">Details</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>Document Number</label>
                        <input type="text" id="doc-number" placeholder="INV-0001">
                    </div>
                    <div class="form-group">
                        <label>Issue Date</label>
                        <input type="date" id="doc-date">
                    </div>
                    <div class="form-group">
                        <label>Due Date</label>
                        <input type="date" id="doc-due-date">
                    </div>
                </div>
                <div class="form-row mt-4">
                    <div class="form-group">
                        <label>From (Your Details)</label>
                        <textarea id="sender-details" placeholder="Your Company Name&#10;123 Business Rd&#10;City, State 12345"></textarea>
                    </div>
                    <div class="form-group">
                        <label>To (Client Details)</label>
                        <textarea id="client-details" placeholder="Client Name&#10;456 Client St&#10;City, State 67890"></textarea>
                    </div>
                </div>
            </div>

            <div class="card">
                <h2 class="text-lg mb-4">Line Items</h2>
                <div class="items-header">
                    <div>Description</div>
                    <div>Qty</div>
                    <div>Price</div>
                    <div>Amount</div>
                    <div></div>
                </div>
                <div id="items-container">
                    <!-- Items rendered here by JS -->
                </div>
                <button id="btn-add-item" class="btn btn-secondary mt-2 w-full">
                    + Add Item
                </button>

                <div class="totals-block">
                    <div class="total-row">
                        <span>Discount Type</span>
                        <select id="discount-type" style="width: 120px; padding: 0.25rem 0.5rem;">
                            <option value="fixed">Fixed</option>
                            <option value="percent">%</option>
                        </select>
                    </div>
                    <div class="total-row">
                        <span>Discount Value</span>
                        <input type="number" id="discount-value" min="0" step="0.01" style="width: 120px; padding: 0.25rem 0.5rem;" value="0">
                    </div>
                    <div class="total-row" id="tax-input-container">
                        <span>Custom Tax Rate (%)</span>
                        <input type="number" id="tax-rate-manual" min="0" step="0.01" style="width: 120px; padding: 0.25rem 0.5rem;" value="0">
                    </div>
                </div>
            </div>
            <!-- Extra space for scrolling -->
            <div style="height: 4rem;"></div>
        </div>

        <!-- PREVIEW SECTION -->
        <div class="preview-section">
            <div class="a4-document" id="doc-preview">
                
                <div class="doc-header">
                    <div>
                        <h1 class="doc-title" id="prev-title">INVOICE</h1>
                        <p class="text-muted font-medium" id="prev-number-label"># INV-0001</p>
                    </div>
                    <div class="doc-meta">
                        <p><span class="text-muted">Date:</span> <strong id="prev-date"></strong></p>
                        <p><span class="text-muted">Due Date:</span> <strong id="prev-due-date"></strong></p>
                    </div>
                </div>

                <div class="doc-addresses">
                    <div class="address-block">
                        <h3>From</h3>
                        <p id="prev-sender"></p>
                    </div>
                    <div class="address-block">
                        <h3>Billed To</h3>
                        <p id="prev-client"></p>
                    </div>
                </div>

                <table class="doc-table">
                    <thead>
                        <tr>
                            <th>Description</th>
                            <th>Qty</th>
                            <th>Price</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody id="prev-items-body">
                        <!-- Preview Items -->
                    </tbody>
                </table>

                <div class="doc-totals">
                    <div class="doc-total-row">
                        <span class="text-muted">Subtotal</span>
                        <span id="prev-subtotal"></span>
                    </div>
                    <div class="doc-total-row" id="prev-discount-row">
                        <span class="text-muted">Discount</span>
                        <span id="prev-discount"></span>
                    </div>
                    <div class="doc-total-row">
                        <span class="text-muted" id="prev-tax-label">Tax</span>
                        <span id="prev-tax"></span>
                    </div>
                    <div class="doc-total-row grand">
                        <span>Total</span>
                        <span id="prev-total"></span>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <div id="toast" class="toast">Action successful</div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- CONSTANTS & STATE ---
            const STORAGE_KEY = 'saas_invoice_data_v1';
            const defaultState = {
                docType: 'Invoice',
                currency: 'USD',
                region: 'USA',
                docNumber: 'INV-0001',
                date: new Date().toISOString().split('T')[0],
                dueDate: '',
                senderDetails: 'My Company LLC\n123 Business Rd\nNew York, NY 10001',
                clientDetails: 'Acme Corp\n456 Client St\nSan Francisco, CA 94105',
                items: [{ id: generateId(), desc: 'Web Development Services', qty: 1, price: 1500 }],
                discountType: 'fixed',
                discountValue: 0,
                taxRateManual: 0 
            };

            let state = { ...defaultState };
            let calcTotals = { subtotal: 0, discount: 0, tax: 0, total: 0 };

            // --- DOM ELEMENTS ---
            const els = {
                docType: document.getElementById('doc-type'),
                currency: document.getElementById('currency'),
                region: document.getElementById('region'),
                docNumber: document.getElementById('doc-number'),
                docDate: document.getElementById('doc-date'),
                docDueDate: document.getElementById('doc-due-date'),
                senderDetails: document.getElementById('sender-details'),
                clientDetails: document.getElementById('client-details'),
                itemsContainer: document.getElementById('items-container'),
                btnAddItem: document.getElementById('btn-add-item'),
                discountType: document.getElementById('discount-type'),
                discountValue: document.getElementById('discount-value'),
                taxRateManual: document.getElementById('tax-rate-manual'),
                taxInputContainer: document.getElementById('tax-input-container'),
                
                // Buttons
                btnSave: document.getElementById('btn-save'),
                btnShare: document.getElementById('btn-share'),
                btnPdf: document.getElementById('btn-pdf'),
                
                // Preview
                prevTitle: document.getElementById('prev-title'),
                prevNumberLabel: document.getElementById('prev-number-label'),
                prevDate: document.getElementById('prev-date'),
                prevDueDate: document.getElementById('prev-due-date'),
                prevSender: document.getElementById('prev-sender'),
                prevClient: document.getElementById('prev-client'),
                prevItemsBody: document.getElementById('prev-items-body'),
                prevSubtotal: document.getElementById('prev-subtotal'),
                prevDiscountRow: document.getElementById('prev-discount-row'),
                prevDiscount: document.getElementById('prev-discount'),
                prevTaxLabel: document.getElementById('prev-tax-label'),
                prevTax: document.getElementById('prev-tax'),
                prevTotal: document.getElementById('prev-total'),
                
                toast: document.getElementById('toast')
            };

            // --- UTILS ---
            function generateId() { return Math.random().toString(36).substr(2, 9); }

            function formatMoney(amount) {
                const locales = {
                    'USD': 'en-US',
                    'GBP': 'en-GB',
                    'CAD': 'en-CA',
                    'AUD': 'en-AU'
                };
                return new Intl.NumberFormat(locales[state.currency] || 'en-US', {
                    style: 'currency',
                    currency: state.currency
                }).format(amount);
            }

            function getTaxRate() {
                switch(state.region) {
                    case 'UK': return 20;
                    case 'CAN': return 5;
                    case 'AUS': return 10;
                    case 'USA': return parseFloat(state.taxRateManual) || 0;
                    default: return 0;
                }
            }

            function getTaxLabel() {
                switch(state.region) {
                    case 'UK': return 'VAT (20%)';
                    case 'CAN': return 'GST/HST (5%)';
                    case 'AUS': return 'GST (10%)';
                    case 'USA': return `Tax (${getTaxRate()}%)`;
                    default: return 'Tax';
                }
            }

            function showToast(msg) {
                if(!els.toast) return;
                els.toast.textContent = msg;
                els.toast.classList.add('show');
                setTimeout(() => els.toast.classList.remove('show'), 3000);
            }

            // --- CORE LOGIC ---
            function loadData() {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    try { state = { ...state, ...JSON.parse(saved) }; } 
                    catch (e) { console.error("Error loading saved data"); }
                }
                syncFormFromState();
                updateAll();
            }

            function saveData(manual = false) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
                if (manual) showToast('Invoice saved successfully');
            }

            function calculate() {
                let sub = 0;
                state.items.forEach(item => { sub += (item.qty * item.price); });
                
                let disc = 0;
                let dVal = parseFloat(state.discountValue) || 0;
                if (state.discountType === 'percent') {
                    disc = sub * (dVal / 100);
                } else {
                    disc = dVal;
                }
                
                let afterDisc = Math.max(0, sub - disc);
                let tax = afterDisc * (getTaxRate() / 100);
                
                calcTotals = {
                    subtotal: sub,
                    discount: disc,
                    tax: tax,
                    total: afterDisc + tax
                };
            }

            // --- RENDERERS ---
            function syncFormFromState() {
                if(!els.docType) return;
                els.docType.value = state.docType;
                els.currency.value = state.currency;
                els.region.value = state.region;
                els.docNumber.value = state.docNumber;
                els.docDate.value = state.date;
                els.docDueDate.value = state.dueDate;
                els.senderDetails.value = state.senderDetails;
                els.clientDetails.value = state.clientDetails;
                els.discountType.value = state.discountType;
                els.discountValue.value = state.discountValue;
                els.taxRateManual.value = state.taxRateManual;
                
                els.taxInputContainer.style.display = state.region === 'USA' ? 'flex' : 'none';
            }

            function renderItemsEditor() {
                if(!els.itemsContainer) return;
                els.itemsContainer.innerHTML = '';
                state.items.forEach((item, index) => {
                    const row = document.createElement('div');
                    row.className = 'item-row';
                    
                    row.innerHTML = `
                        <input type="text" placeholder="Description" value="${item.desc}" data-id="${item.id}" data-field="desc">
                        <input type="number" min="1" step="1" value="${item.qty}" data-id="${item.id}" data-field="qty">
                        <input type="number" min="0" step="0.01" value="${item.price}" data-id="${item.id}" data-field="price">
                        <div style="padding: 0.625rem 0; font-weight: 500;">${formatMoney(item.qty * item.price)}</div>
                        <button class="btn btn-danger btn-icon del-item" data-id="${item.id}" title="Delete">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                        </button>
                    `;
                    els.itemsContainer.appendChild(row);
                });

                // Bind dynamic item inputs
                els.itemsContainer.querySelectorAll('input').forEach(input => {
                    input.addEventListener('input', (e) => {
                        const id = e.target.dataset.id;
                        const field = e.target.dataset.field;
                        const item = state.items.find(i => i.id === id);
                        if(item) {
                            item[field] = field === 'desc' ? e.target.value : parseFloat(e.target.value) || 0;
                            updateAll(false); // Don't re-render entire editor inputs to avoid focus loss
                            renderTotalsOnly(); 
                        }
                    });
                });

                // Bind delete buttons
                els.itemsContainer.querySelectorAll('.del-item').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const id = e.currentTarget.dataset.id;
                        state.items = state.items.filter(i => i.id !== id);
                        if(state.items.length === 0) {
                            state.items.push({ id: generateId(), desc: '', qty: 1, price: 0 });
                        }
                        updateAll();
                    });
                });
            }

            function renderPreview() {
                if(!els.prevTitle) return;
                els.prevTitle.textContent = state.docType.toUpperCase();
                els.prevNumberLabel.textContent = `# ${state.docNumber}`;
                els.prevDate.textContent = state.date;
                els.prevDueDate.textContent = state.dueDate;
                els.prevSender.textContent = state.senderDetails;
                els.prevClient.textContent = state.clientDetails;

                els.prevItemsBody.innerHTML = '';
                state.items.forEach(item => {
                    if(!item.desc && item.price === 0) return;
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${item.desc}</td>
                        <td>${item.qty}</td>
                        <td>${formatMoney(item.price)}</td>
                        <td>${formatMoney(item.qty * item.price)}</td>
                    `;
                    els.prevItemsBody.appendChild(tr);
                });

                renderTotalsOnly();
            }

            function renderTotalsOnly() {
                calculate();
                
                if(els.prevSubtotal) {
                    els.prevSubtotal.textContent = formatMoney(calcTotals.subtotal);
                    els.prevDiscount.textContent = `-${formatMoney(calcTotals.discount)}`;
                    els.prevDiscountRow.style.display = calcTotals.discount > 0 ? 'flex' : 'none';
                    
                    els.prevTaxLabel.textContent = getTaxLabel();
                    els.prevTax.textContent = formatMoney(calcTotals.tax);
                    els.prevTotal.textContent = formatMoney(calcTotals.total);
                }

                // Update row totals in editor without recreating inputs
                if(els.itemsContainer) {
                    const rows = els.itemsContainer.querySelectorAll('.item-row');
                    state.items.forEach((item, index) => {
                        if(rows[index]) {
                            const totalDiv = rows[index].querySelector('div');
                            if(totalDiv) totalDiv.textContent = formatMoney(item.qty * item.price);
                        }
                    });
                }
                
                saveData(); // auto-save
            }

            function updateAll(fullEditorRender = true) {
                if(fullEditorRender) renderItemsEditor();
                renderPreview();
            }

            // --- BIND EVENTS ---
            if(els.docType) {
                // Form interactions
                els.docType.addEventListener('change', e => { state.docType = e.target.value; updateAll(false); });
                els.currency.addEventListener('change', e => { state.currency = e.target.value; updateAll(); });
                els.region.addEventListener('change', e => { 
                    state.region = e.target.value; 
                    els.taxInputContainer.style.display = state.region === 'USA' ? 'flex' : 'none';
                    updateAll(false); 
                });
                els.docNumber.addEventListener('input', e => { state.docNumber = e.target.value; els.prevNumberLabel.textContent = `# ${state.docNumber}`; saveData(); });
                els.docDate.addEventListener('input', e => { state.date = e.target.value; els.prevDate.textContent = state.date; saveData(); });
                els.docDueDate.addEventListener('input', e => { state.dueDate = e.target.value; els.prevDueDate.textContent = state.dueDate; saveData(); });
                els.senderDetails.addEventListener('input', e => { state.senderDetails = e.target.value; els.prevSender.textContent = state.senderDetails; saveData(); });
                els.clientDetails.addEventListener('input', e => { state.clientDetails = e.target.value; els.prevClient.textContent = state.clientDetails; saveData(); });
                
                els.discountType.addEventListener('change', e => { state.discountType = e.target.value; updateAll(false); });
                els.discountValue.addEventListener('input', e => { state.discountValue = e.target.value; updateAll(false); });
                els.taxRateManual.addEventListener('input', e => { state.taxRateManual = e.target.value; updateAll(false); });

                els.btnAddItem.addEventListener('click', () => {
                    state.items.push({ id: generateId(), desc: '', qty: 1, price: 0 });
                    updateAll();
                });

                // Top Bar Actions
                els.btnSave.addEventListener('click', () => saveData(true));
                els.btnPdf.addEventListener('click', () => window.print());
                
                els.btnShare.addEventListener('click', async () => {
                    const text = `${state.docType} ${state.docNumber}\nTotal: ${formatMoney(calcTotals.total)}`;
                    if (navigator.share) {
                        try {
                            await navigator.share({
                                title: `${state.docType} - ${state.docNumber}`,
                                text: text
                            });
                        } catch (err) {
                            console.error('Share error:', err);
                        }
                    } else {
                        try {
                            await navigator.clipboard.writeText(text);
                            showToast('Copied summary to clipboard');
                        } catch(err) {
                            showToast('Failed to copy');
                        }
                    }
                });
            }

            // Init
            loadData();
        });
    </script>
</body>
</html>

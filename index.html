<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Invoice Suite Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f5f3ff', 100: '#ede9fe', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }
                    }
                }
            }
        }
    </script>
    
    <style>
        body { font-family: 'Inter', sans-serif; transition: background-color 0.3s, color 0.3s; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }
        .dark .glass-panel {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(51, 65, 85, 0.5);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        
        .template-classic { font-family: 'Inter', sans-serif; }
        .template-modern { font-family: 'Georgia', serif; letter-spacing: 0.02em; }
        .template-minimal { font-family: monospace; text-transform: uppercase; font-size: 0.8rem; }

        /* Smooth loading state for non-blocking UI */
        .is-loading {
            pointer-events: none;
            opacity: 0.7;
            position: relative;
        }
        .is-loading::after {
            content: "";
            position: absolute;
            width: 16px;
            height: 16px;
            top: 0; left: 0; right: 0; bottom: 0;
            margin: auto;
            border: 2px solid transparent;
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        .is-loading > span { opacity: 0; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-50 antialiased min-h-screen">

    <!-- Main App Layout (Visible by default) -->
    <div id="app-layout" class="flex flex-col h-screen overflow-hidden">
        
        <header class="h-16 border-b border-slate-200 dark:border-slate-800 px-6 flex items-center justify-between glass-panel z-30 shrink-0">
            <div class="flex items-center gap-4">
                <span class="font-bold text-xl tracking-tight bg-gradient-to-r from-brand-600 to-indigo-500 bg-clip-text text-transparent">InvoiceSuite Pro</span>
                <span id="badge-plan" class="px-2 py-0.5 text-xs font-semibold uppercase tracking-wider rounded bg-amber-100 text-amber-800 dark:bg-amber-900/30 dark:text-amber-400">Pro Version</span>
            </div>
            <div class="flex items-center gap-3">
                <button id="btn-dark-toggle" aria-label="Toggle Dark Mode" class="p-2 border rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800 border-slate-200 dark:border-slate-700 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M14 12a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                </button>
            </div>
        </header>

        <div class="flex flex-1 overflow-hidden">
            
            <aside class="w-80 border-r border-slate-200 dark:border-slate-800 glass-panel flex flex-col h-full overflow-hidden shrink-0 no-print">
                <div class="p-4 border-b border-slate-200 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-900/50 space-y-3">
                    <div class="p-3 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm">
                        <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Total Volume</p>
                        <p id="dash-volume" class="text-xl font-bold tracking-tight text-slate-800 dark:text-slate-100">$0.00</p>
                    </div>
                </div>

                <div class="p-4 border-b border-slate-200 dark:border-slate-800">
                    <button id="btn-new-document" class="w-full py-2 bg-brand-600 hover:bg-brand-700 text-white font-medium rounded-lg shadow-sm text-sm transition flex items-center justify-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"></path></svg>
                        New Document
                    </button>
                </div>

                <div id="history-container" class="flex-1 overflow-y-auto divide-y divide-slate-100 dark:divide-slate-800/50"></div>
            </aside>

            <main class="flex-1 grid grid-cols-1 xl:grid-cols-2 overflow-hidden bg-slate-50 dark:bg-slate-900/40">
                
                <section class="h-full overflow-y-auto p-6 space-y-6 no-print border-r border-slate-200 dark:border-slate-800/80">
                    
                    <div class="flex items-center justify-between bg-white dark:bg-slate-800 p-4 border border-slate-200 dark:border-slate-700 rounded-xl shadow-sm">
                        <div class="flex items-center gap-2">
                            <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Status:</span>
                            <select id="doc-status" class="px-2 py-1 text-xs font-medium border rounded bg-slate-50 dark:bg-slate-900 border-slate-200 dark:border-slate-700 outline-none">
                                <option value="Pending">Pending</option>
                                <option value="Paid">Paid</option>
                                <option value="Unpaid">Unpaid</option>
                            </select>
                        </div>
                        <div class="flex items-center gap-2">
                            <button id="btn-pdf" class="px-3 py-1.5 bg-brand-600 hover:bg-brand-700 text-white text-xs font-semibold rounded-lg shadow-sm transition">
                                <span>Export PDF</span>
                            </button>
                        </div>
                    </div>

                    <!-- Configuration Panels -->
                    <div class="bg-white dark:bg-slate-800 p-5 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm space-y-4">
                        <h3 class="text-sm font-bold uppercase tracking-wider text-slate-400">Settings</h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-xs font-medium mb-1 text-slate-500">Type</label>
                                <select id="doc-type" class="w-full px-3 py-1.5 text-sm border rounded-lg dark:bg-slate-900 dark:border-slate-700 outline-none">
                                    <option value="Invoice">Invoice</option>
                                    <option value="Receipt">Receipt</option>
                                    <option value="Quote">Quote</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-medium mb-1 text-slate-500">Currency</label>
                                <select id="currency" class="w-full px-3 py-1.5 text-sm border rounded-lg dark:bg-slate-900 dark:border-slate-700 outline-none">
                                    <option value="USD">USD ($)</option>
                                    <option value="GBP">GBP (£)</option>
                                    <option value="CAD">CAD ($)</option>
                                    <option value="AUD">AUD ($)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-medium mb-1 text-slate-500">Region (Tax)</label>
                                <select id="region" class="w-full px-3 py-1.5 text-sm border rounded-lg dark:bg-slate-900 dark:border-slate-700 outline-none">
                                    <option value="USA">USA (Custom)</option>
                                    <option value="UK">UK (VAT 20%)</option>
                                    <option value="CAN">Canada (GST 5%)</option>
                                    <option value="AUS">Australia (GST 10%)</option>
                                </select>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 pt-2">
                            <div>
                                <label class="block text-xs font-medium mb-1 text-slate-500">Template Engine</label>
                                <select id="doc-template" class="w-full px-3 py-1.5 text-sm border rounded-lg dark:bg-slate-900 dark:border-slate-700 outline-none">
                                    <option value="classic">Classic Corporate</option>
                                    <option value="modern">Modern Editorial</option>
                                    <option value="minimal">Minimal Technical</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <!-- Meta Data Panel -->
                    <div class="bg-white dark:bg-slate-800 p-5 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                            <div>
                                <label class="block text-xs font-medium mb-1 text-slate-500">Doc #</label>
                                <input type="text" id="doc-number" class="w-full px-3 py-1.5 text-sm border rounded-lg dark:bg-slate-900 dark:border-slate-700 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-medium mb-1 text-slate-500">Date Issued</label>
                                <input type="date" id="doc-date" class="w-full px-3 py-1.5 text-sm border rounded-lg dark:bg-slate-900 dark:border-slate-700 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-medium mb-1 text-slate-500">Due Date</label>
                                <input type="date" id="doc-due-date" class="w-full px-3 py-1.5 text-sm border rounded-lg dark:bg-slate-900 dark:border-slate-700 outline-none">
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-medium mb-1 text-slate-500">From</label>
                                <textarea id="sender-details" rows="3" class="w-full px-3 py-1.5 text-sm border rounded-lg dark:bg-slate-900 dark:border-slate-700 font-mono text-xs outline-none"></textarea>
                            </div>
                            <div>
                                <label class="block text-xs font-medium mb-1 text-slate-500">To</label>
                                <textarea id="client-details" rows="3" class="w-full px-3 py-1.5 text-sm border rounded-lg dark:bg-slate-900 dark:border-slate-700 font-mono text-xs outline-none"></textarea>
                            </div>
                        </div>
                    </div>

                    <!-- Transaction Array -->
                    <div class="bg-white dark:bg-slate-800 p-5 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm space-y-4">
                        <h3 class="text-sm font-bold uppercase tracking-wider text-slate-400">Line Items</h3>
                        
                        <div id="items-container" class="space-y-3"></div>

                        <button id="btn-add-item" class="w-full py-2 border-2 border-dashed border-slate-200 dark:border-slate-700 hover:border-brand-500 dark:hover:border-brand-500 rounded-lg text-xs font-semibold transition text-slate-500 dark:text-slate-400 hover:text-brand-600 outline-none">
                            + Add Item
                        </button>

                        <div class="pt-4 border-t border-slate-100 dark:border-slate-700 flex flex-col items-end gap-3">
                            <div class="flex items-center gap-3 text-xs">
                                <span class="text-slate-400 font-medium">Discount:</span>
                                <select id="discount-type" class="px-2 py-1 border rounded bg-slate-50 dark:bg-slate-900 border-slate-200 dark:border-slate-700 outline-none">
                                    <option value="fixed">Fixed</option>
                                    <option value="percent">Percentage</option>
                                </select>
                                <input type="number" id="discount-value" min="0" step="0.01" class="w-20 px-2 py-1 border rounded text-right dark:bg-slate-900 dark:border-slate-700 outline-none" value="0">
                            </div>
                            <div class="flex items-center gap-3 text-xs" id="tax-input-container">
                                <span class="text-slate-400 font-medium">Tax Rate (%):</span>
                                <input type="number" id="tax-rate-manual" min="0" step="0.01" class="w-20 px-2 py-1 border rounded text-right dark:bg-slate-900 dark:border-slate-700 outline-none" value="0">
                            </div>
                        </div>
                    </div>
                    <div class="h-12"></div>
                </section>

                <section class="h-full overflow-y-auto p-6 bg-slate-200/50 dark:bg-slate-950/20 flex justify-center">
                    <div id="capture-box" class="w-full max-w-[210mm]">
                        <div class="a4-document bg-white text-slate-900 p-[20mm] min-h-[297mm] template-classic shadow-xl rounded-sm transition-all" id="doc-preview">
                            
                            <div id="tpl-header-block" class="flex justify-between items-start mb-12">
                                <div>
                                    <h1 class="text-4xl font-extrabold tracking-tight text-brand-600 uppercase mb-1" id="prev-title">INVOICE</h1>
                                    <p class="text-sm font-bold text-slate-700" id="prev-number-label"># INV-0001</p>
                                    <span id="prev-status-badge" class="inline-block mt-2 px-2 py-0.5 text-xs font-bold uppercase rounded bg-slate-100 text-slate-800">Pending</span>
                                </div>
                                <div class="text-right text-xs space-y-1">
                                    <p><span class="text-slate-400 uppercase font-medium">Date:</span> <strong id="prev-date" class="text-slate-800"></strong></p>
                                    <p><span class="text-slate-400 uppercase font-medium">Due:</span> <strong id="prev-due-date" class="text-slate-800"></strong></p>
                                </div>
                            </div>

                            <div id="tpl-address-block" class="grid grid-cols-2 gap-8 mb-12 text-sm">
                                <div>
                                    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">From</h3>
                                    <p id="prev-sender" class="whitespace-pre-line text-slate-700 leading-relaxed font-medium"></p>
                                </div>
                                <div>
                                    <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">To</h3>
                                    <p id="prev-client" class="whitespace-pre-line text-slate-700 leading-relaxed font-medium"></p>
                                </div>
                            </div>

                            <table class="w-full border-collapse mb-8 text-sm">
                                <thead>
                                    <tr class="border-b-2 border-slate-900 text-xs font-bold uppercase tracking-wider text-slate-400 text-left">
                                        <th class="py-2">Description</th>
                                        <th class="py-2 text-center w-16">Qty</th>
                                        <th class="py-2 text-right w-28">Unit Price</th>
                                        <th class="py-2 text-right w-32">Total</th>
                                    </tr>
                                </thead>
                                <tbody id="prev-items-body" class="divide-y divide-slate-100"></tbody>
                            </table>

                            <div class="w-64 ml-auto text-sm space-y-2 pt-4 border-t-2 border-slate-100">
                                <div class="flex justify-between">
                                    <span class="text-slate-400 font-medium">Subtotal</span>
                                    <span id="prev-subtotal" class="font-semibold text-slate-800"></span>
                                </div>
                                <div class="flex justify-between text-emerald-600 hidden" id="prev-discount-row">
                                    <span class="font-medium">Discount</span>
                                    <span id="prev-discount"></span>
                                </div>
                                <div class="flex justify-between">
                                    <span id="prev-tax-label" class="text-slate-400 font-medium">Tax</span>
                                    <span id="prev-tax" class="font-semibold text-slate-800"></span>
                                </div>
                                <div class="flex justify-between text-lg font-bold pt-2 border-t border-slate-900 text-brand-600">
                                    <span>Total</span>
                                    <span id="prev-total"></span>
                                </div>
                            </div>

                        </div>
                    </div>
                </section>
            </main>
        </div>
    </div>

    <div id="toast" class="fixed bottom-6 right-6 px-4 py-2.5 bg-slate-900 dark:bg-white text-white dark:text-slate-900 rounded-xl shadow-xl font-medium text-sm transform translate-y-24 opacity-0 transition duration-300 ease-out z-50 pointer-events-none"></div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toastEl = document.getElementById('toast');

            function showToast(msg) {
                toastEl.textContent = msg;
                toastEl.classList.remove('translate-y-24', 'opacity-0');
                setTimeout(() => toastEl.classList.add('translate-y-24', 'opacity-0'), 3000);
            }

            // --- APP STATE MANAGEMENT ---
            let state = {
                docType: 'Invoice', currency: 'USD', region: 'USA',
                docNumber: 'INV-0001', date: new Date().toISOString().split('T')[0], dueDate: '',
                senderDetails: 'My Company LLC\nNew York, NY 10001',
                clientDetails: 'Acme Corp\nSan Francisco, CA 94105',
                items: [{ id: crypto.randomUUID(), desc: 'Web Development Services', qty: 1, price: 1500.00 }],
                discountType: 'fixed', discountValue: 0, taxRateManual: 0, status: 'Pending', template_id: 'classic'
            };

            let calcTotals = { subtotal: 0, discount: 0, tax: 0, total: 0 };
            const itemsContainer = document.getElementById('items-container');
            const btnPdf = document.getElementById('btn-pdf');

            // --- CORE UTILS ---
            function formatMoney(amount) {
                const locales = { 'USD': 'en-US', 'GBP': 'en-GB', 'CAD': 'en-CA', 'AUD': 'en-AU' };
                return new Intl.NumberFormat(locales[state.currency] || 'en-US', {
                    style: 'currency', currency: state.currency
                }).format(amount);
            }

            function getTaxRate() {
                switch(state.region) {
                    case 'UK': return 20; case 'CAN': return 5; case 'AUS': return 10;
                    case 'USA': return parseFloat(state.taxRateManual) || 0; default: return 0;
                }
            }

            // --- ENGINE & LOGIC ---
            function calculate() {
                let sub = state.items.reduce((acc, item) => acc + (item.qty * item.price), 0);
                let dVal = parseFloat(state.discountValue) || 0;
                let disc = state.discountType === 'percent' ? sub * (dVal / 100) : dVal;
                let afterDisc = Math.max(0, sub - disc);
                let tax = afterDisc * (getTaxRate() / 100);
                calcTotals = { subtotal: sub, discount: disc, tax: tax, total: afterDisc + tax };
            }

            // Memory Leak Prevented Using Event Delegation
            itemsContainer.addEventListener('input', (e) => {
                if (e.target.tagName === 'INPUT') {
                    const id = e.target.dataset.id;
                    const field = e.target.dataset.field;
                    const item = state.items.find(i => i.id === id);
                    if(item) {
                        item[field] = field === 'desc' ? e.target.value : parseFloat(e.target.value) || 0;
                        renderTotalsOnly();
                    }
                }
            });

            itemsContainer.addEventListener('click', (e) => {
                const btn = e.target.closest('.del-item');
                if (btn) {
                    const id = btn.dataset.id;
                    state.items = state.items.filter(i => i.id !== id);
                    if(state.items.length === 0) {
                        state.items.push({ id: crypto.randomUUID(), desc: '', qty: 1, price: 0 });
                    }
                    updateAll();
                }
            });

            function renderItemsEditor() {
                itemsContainer.innerHTML = state.items.map(item => `
                    <div class="grid grid-cols-[2fr_1fr_1fr_1fr_40px] gap-2 items-center">
                        <input type="text" placeholder="Description" value="${item.desc}" data-id="${item.id}" data-field="desc" class="px-2 py-1 text-xs border rounded dark:bg-slate-900 dark:border-slate-700 outline-none">
                        <input type="number" min="1" step="1" value="${item.qty}" data-id="${item.id}" data-field="qty" class="px-2 py-1 text-xs border rounded text-center dark:bg-slate-900 dark:border-slate-700 outline-none">
                        <input type="number" min="0" step="0.01" value="${item.price}" data-id="${item.id}" data-field="price" class="px-2 py-1 text-xs border rounded text-right dark:bg-slate-900 dark:border-slate-700 outline-none">
                        <div class="text-right text-xs font-semibold px-2 item-total">${formatMoney(item.qty * item.price)}</div>
                        <button class="p-1 border rounded hover:bg-red-50 text-red-500 dark:border-slate-700 dark:hover:bg-red-950/20 del-item outline-none" data-id="${item.id}">
                            <svg class="w-3.5 h-3.5 pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        </button>
                    </div>
                `).join('');
            }

            function renderPreview() {
                const previewEl = document.getElementById('doc-preview');
                previewEl.className = `a4-document bg-white text-slate-900 p-[20mm] min-h-[297mm] transition-all template-${state.template_id}`;
                
                document.getElementById('prev-title').textContent = state.docType.toUpperCase();
                document.getElementById('prev-number-label').textContent = `# ${state.docNumber}`;
                document.getElementById('prev-date').textContent = state.date;
                document.getElementById('prev-due-date').textContent = state.dueDate;
                document.getElementById('prev-sender').textContent = state.senderDetails;
                document.getElementById('prev-client').textContent = state.clientDetails;
                
                const badge = document.getElementById('prev-status-badge');
                badge.textContent = state.status;
                badge.className = `inline-block mt-2 px-2 py-0.5 text-xs font-bold uppercase rounded ${state.status === 'Paid' ? 'bg-emerald-100 text-emerald-800' : state.status === 'Unpaid' ? 'bg-rose-100 text-rose-800' : 'bg-amber-100 text-amber-800'}`;

                document.getElementById('prev-items-body').innerHTML = state.items.filter(i => i.desc || i.price > 0).map(item => `
                    <tr class="border-b border-slate-100">
                        <td class="py-3 font-medium text-slate-700">${item.desc}</td>
                        <td class="py-3 text-center text-slate-500">${item.qty}</td>
                        <td class="py-3 text-right text-slate-500">${formatMoney(item.price)}</td>
                        <td class="py-3 text-right font-semibold text-slate-800">${formatMoney(item.qty * item.price)}</td>
                    </tr>
                `).join('');

                renderTotalsOnly();
            }

            function renderTotalsOnly() {
                calculate();
                document.getElementById('prev-subtotal').textContent = formatMoney(calcTotals.subtotal);
                document.getElementById('prev-discount').textContent = `-${formatMoney(calcTotals.discount)}`;
                document.getElementById('prev-discount-row').style.display = calcTotals.discount > 0 ? 'flex' : 'none';
                
                let taxLabel = state.region === 'USA' ? `Tax (${getTaxRate()}%)` : state.region === 'UK' ? 'VAT (20%)' : state.region === 'CAN' ? 'GST (5%)' : 'GST (10%)';
                document.getElementById('prev-tax-label').textContent = taxLabel;
                document.getElementById('prev-tax').textContent = formatMoney(calcTotals.tax);
                document.getElementById('prev-total').textContent = formatMoney(calcTotals.total);

                const totalDivs = itemsContainer.querySelectorAll('.item-total');
                state.items.forEach((item, index) => {
                    if(totalDivs[index]) totalDivs[index].textContent = formatMoney(item.qty * item.price);
                });
            }

            function updateAll(fullRender = true) {
                if(fullRender) renderItemsEditor();
                renderPreview();
            }

            // Configuration Listeners
            ['doc-type', 'currency', 'region', 'doc-template', 'discount-type', 'doc-status'].forEach(id => {
                document.getElementById(id).addEventListener('change', e => { 
                    const key = id.replace(/-([a-z])/g, (g) => g[1].toUpperCase());
                    if (id === 'doc-template') state.template_id = e.target.value;
                    else state[key] = e.target.value;
                    
                    if(id === 'region') document.getElementById('tax-input-container').style.display = state.region === 'USA' ? 'flex' : 'none';
                    
                    updateAll(id === 'currency' || id === 'discount-type');
                });
            });

            ['doc-number', 'doc-date', 'doc-due-date', 'sender-details', 'client-details', 'discount-value', 'tax-rate-manual'].forEach(id => {
                document.getElementById(id).addEventListener('input', e => {
                    const key = id.replace(/-([a-z])/g, (g) => g[1].toUpperCase());
                    state[key === 'docDate' ? 'date' : key] = e.target.value;
                    if(id.includes('details') || id.includes('number') || id.includes('date')) updateAll(false);
                    else updateAll(true);
                });
            });

            document.getElementById('btn-add-item').addEventListener('click', () => {
                state.items.push({ id: crypto.randomUUID(), desc: '', qty: 1, price: 0 });
                updateAll();
            });

            // Non-blocking PDF Export 
            btnPdf.addEventListener('click', async () => {
                const element = document.getElementById('doc-preview');
                btnPdf.classList.add('is-loading');
                showToast("Compiling PDF asynchronously...");

                // Yield to main thread
                await new Promise(resolve => requestAnimationFrame(() => setTimeout(resolve, 50)));

                const options = {
                    margin: 0,
                    filename: `${state.docNumber || 'Invoice'}.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true, letterRendering: true },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };
                
                try {
                    await html2pdf().set(options).from(element).save();
                    showToast("Export completed successfully.");
                } catch (error) {
                    showToast("Error generating PDF.");
                    console.error(error);
                } finally {
                    btnPdf.classList.remove('is-loading');
                }
            });

            document.getElementById('btn-dark-toggle').addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
            });

            updateAll();
        });
    </script>
</body>
